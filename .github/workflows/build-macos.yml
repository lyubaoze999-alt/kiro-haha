name: Build macOS

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build kiro-haha (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri-shell/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('tauri-shell/src-tauri/Cargo.lock') }}

      - name: Install adapter deps (bundled)
        run: |
          cd tauri-shell/src-tauri
          mkdir -p adapter
          cp -R ../../adapter/server.js ../../adapter/acp.js ../../adapter/package.json ../../adapter/package-lock.json adapter/
          cd adapter
          npm install --omit=dev

      - name: Install adapter deps (top-level)
        run: cd adapter && npm install --omit=dev

      - name: Build frontend
        env:
          VITE_DESKTOP_SERVER_URL: 'http://127.0.0.1:3789'
        run: |
          cd frontend
          bun install
          bun run build

      - name: Stage frontend dist for Tauri
        run: |
          mkdir -p tauri-shell/cchaha-dist
          cp -R frontend/dist/. tauri-shell/cchaha-dist/

      - name: Install tauri-shell deps
        run: cd tauri-shell && npm install

      - name: Build Tauri app (macOS)
        run: cd tauri-shell && npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kiro-haha-macos
          path: |
            tauri-shell/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Attach to release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tauri-shell/src-tauri/target/release/bundle/dmg/*.dmg
